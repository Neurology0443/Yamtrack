services:
  yamtrack:
    container_name: yamtrack
    image: ghcr.io/neurology0443/yamtrack:latest
    # image: ghcr.io/fuzzygrim/yamtrack
    # build:
      # context: .
      # dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - TZ=Europe/Berlin
      - SECRET=longstring
      - REDIS_URL=redis://redis:6379
      - MAL_API=API_KEY
      # MyAnimeList API rate limit per minute.
      # Lower this if you receive HTTP 429 responses.
      - MAL_RATE_LIMIT_PER_MINUTE=100
      - DB_HOST=db
      - DB_NAME=yamtrack
      - DB_USER=yamtrack
      - DB_PASSWORD=yamtrack
      - DB_PORT=5432
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    container_name: yamtrack-db
    environment:
      - POSTGRES_DB=yamtrack
      - POSTGRES_USER=yamtrack
      - POSTGRES_PASSWORD=yamtrack
    volumes:
      - ./db:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    container_name: yamtrack-redis
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
