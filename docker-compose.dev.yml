name: yamtrack-dev

services:
  yamtrack-dev:
    container_name: yamtrack-dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: yamtrack-dev
    image: yamtrack-dev:local
    # image: ghcr.io/fuzzygrim/yamtrack
    restart: unless-stopped

    depends_on:
      yamtrack-dev-postgres:
        condition: service_healthy
      yamtrack-dev-redis:
        condition: service_healthy
    networks:
      - proxy
      - backend

    environment:
      - TZ=Europe/Berlin
      - SECRET=${YAMTRACK_SECRET}

      # Redis test isolé
      - REDIS_URL=redis://yamtrack-dev-redis:6379

      # PostgreSQL test isolé
      - DB_HOST=yamtrack-dev-postgres
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PORT=5432


      #  MyAnimeList API + MAL anime metadata cache
      - MAL_API=${MAL_API}                                                          #Personal Mal API key 
      - MAL_RATE_LIMIT_PER_MINUTE=50                                                #default 100
      # - MAL_CACHE_FRESH_DAYS=7                                                    #default 7
      # - MAL_CACHE_KEEP_DAYS=365                                                   #default 365
      # - MAL_CACHE_RETRY_AFTER_ERROR_HOURS=12                                      #default 12
      # - MAL_CACHE_REFRESH_MIN_INTERVAL_HOURS=24                                   #default 24

      # MAL anime franchise import automation
      - ANIME_FRANCHISE_IMPORT_AUTOMATION_ENABLED=True                              #default false
      # - ANIME_FRANCHISE_IMPORT_AUTOMATION_INTERVAL_MINUTES=1440                   #default 1440 (24h)
      # - ANIME_FRANCHISE_IMPORT_AUTOMATION_PROFILE=continuity                      #default continuity (continuity, satellites, complete)
      # - ANIME_FRANCHISE_IMPORT_AUTOMATION_REFRESH_CACHE=False                     #default false
      # - ANIME_FRANCHISE_IMPORT_AUTOMATION_FULL_RESCAN=False                       #default false
      # - ANIME_FRANCHISE_IMPORT_AUTOMATION_LIMIT=10                                #default None

      # MAL anime franchise payload cache
      - ANIME_FRANCHISE_GROUPING_ENABLED=True                                       #default true
      # - ANIME_FRANCHISE_CACHE_TTL_DAYS=365                                        #default 365
      # - ANIME_FRANCHISE_CACHE_ALIASES_ENABLED=True                                #default true
      # - ANIME_FRANCHISE_CACHE_FRESH_DAYS=30                                       #default 30
      # - ANIME_FRANCHISE_BUILD_COOLDOWN_HOURS=24                                   #default 24
      # - ANIME_FRANCHISE_RETRY_AFTER_ERROR_HOURS=12                                #default 12
      # - ANIME_FRANCHISE_QUEUE_LOCK_MINUTES=30                                     #default 30
      # - ANIME_FRANCHISE_TASK_LOCK_MINUTES=60                                      #default 60
      # - ANIME_FRANCHISE_MAX_NODES=50                                              #default 50
      # - ANIME_FRANCHISE_PAYLOAD_SCHEMA_VERSION=1                                  #default 1

      # Anime Franchise Maintenance
      - ANIME_FRANCHISE_MAINTENANCE_SCAN_ENABLED=True                               #default false
      # - ANIME_FRANCHISE_MAINTENANCE_SCAN_INTERVAL_MINUTES=60                      #default 60
      # - ANIME_FRANCHISE_MAINTENANCE_SCAN_BATCH_SIZE=10                            #default 10
      # - ANIME_FRANCHISE_MAINTENANCE_INITIAL_SPREAD_HOURS=24                       #default 24
      # - ANIME_FRANCHISE_MAINTENANCE_REFRESH_CACHE=True                            #default true
      # - ANIME_FRANCHISE_MAINTENANCE_LOCK_MINUTES=360                              #default 360
      # - ANIME_FRANCHISE_MAINTENANCE_ERROR_RETRY_HOURS=12                          #default 12
      # - ANIME_FRANCHISE_MAINTENANCE_REFRESH_SERIES_VIEW_ON_CHANGE=True            #default true
      # - ANIME_FRANCHISE_MAINTENANCE_REFRESH_SERIES_VIEW_ON_SUCCESS=False          #default false
      # - ANIME_FRANCHISE_MAINTENANCE_DEEP_COLD_MIN_AGE_YEARS=15                    #default 15
      # - ANIME_FRANCHISE_MAINTENANCE_DEEP_COLD_MIN_STABLE_SCANS=8                  #default 8
      # - ANIME_FRANCHISE_MAINTENANCE_DEEP_COLD_MIN_CHANGE_AGE_DAYS=180             #default 180
      # - ANIME_FRANCHISE_MAINTENANCE_DEEP_COLD_MIN_DAYS=21                         #default 21
      # - ANIME_FRANCHISE_MAINTENANCE_DEEP_COLD_MAX_DAYS=30                         #default 30

      # MAL anime release-date notifications
      - ANIME_RELEASE_DATE_NOTIFICATIONS_ENABLED=True                               #default true
      # - ANIME_RELEASE_DATE_SCAN_INTERVAL_HOURS=12                                 #default 12
      # - ANIME_RELEASE_DATE_SCAN_BATCH_SIZE=25                                     #default 25
      # - ANIME_RELEASE_DATE_SCAN_MIN_REFRESH_HOURS=24                              #default 24
      # - ANIME_RELEASE_DATE_SCAN_ERROR_RETRY_HOURS=12                              #default 12
      # - ANIME_RELEASE_DATE_SCAN_MAX_BACKOFF_DAYS=7                                #default 7
      # - ANIME_RELEASE_DATE_SCAN_LOCK_MINUTES=360                                  #default 360


      # - ANIME_FRANCHISE_CONTEXT_LOOKUP_ENABLED=True ????


    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"

      # Router test isolé
      - "traefik.http.routers.yamtrack-dev.entrypoints=websecure"
      - "traefik.http.routers.yamtrack-dev.rule=Host(`yamtrack-dev.home.lab`)"
      - "traefik.http.routers.yamtrack-dev.tls=true"
      - "traefik.http.routers.yamtrack-dev.middlewares=default-headers@file"

      # Service test isolé
      - "traefik.http.services.yamtrack-dev.loadbalancer.server.port=8000"

  yamtrack-dev-postgres:
    image: postgres:16-alpine
    container_name: yamtrack-dev-postgres
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - yamtrack_dev_database:/var/lib/postgresql/data

    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  yamtrack-dev-redis:
    container_name: yamtrack-dev-redis
    image: redis:8-alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - yamtrack_dev_redis:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true
    name: traefik-net

  backend:
    internal: true
    name: yamtrack-dev-backend

volumes:
  yamtrack_dev_redis:
    name: yamtrack_dev_redis
    driver: local
  yamtrack_dev_database:
    name: yamtrack_dev_database
    driver: local


  #yamtrack_dev_redis:
    #external: true
    #name: yamtrack_dev_redis

  #yamtrack_dev_database:
    #external: true
    #name: yamtrack_dev_database
